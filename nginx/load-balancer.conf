# Un worker por core; cada uno con un techo alto de conexiones.
worker_processes auto;
# Debe caber en el RLIMIT_NOFILE del contenedor (ver ulimits del gateway en docker-compose).
worker_rlimit_nofile 65535;

# Cada request en vuelo consume 2 conexiones (cliente + upstream), así que el
# default de 512 topa en ~256 concurrentes. Lo subimos para soportar load-tests.
events {
  worker_connections 32768;
}

http {
  # DNS embebido de Docker; re-resuelve para repartir entre réplicas escaladas.
  resolver 127.0.0.11 valid=5s ipv6=off;

  # Sin access_log: a este volumen de requests el log es un cuello de botella.
  access_log off;

  server {
    listen 3000 backlog=4096;

    location / {
      # proxy_pass con variable → resolución por-request (round-robin real).
      # Sin URI en la variable, nginx reenvía el path/query original (/jobs/sync?...).
      set $backend "http://main-app:3000";
      proxy_pass $backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
